spring.application.name=daj2ee
spring.profiles.active=local

# ─────────────────────────────────────────
# Database (Railway Environment Variables)
# ─────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${PGHOST:postgres.railway.internal}:${PGPORT:5432}/${PGDATABASE:railway}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─────────────────────────────────────────
# Server
# ─────────────────────────────────────────
server.port=${PORT:8080}

# ─────────────────────────────────────────
# Tomcat thread pool
# Default is 200 threads × ~1 MB stack = 200 MB wasted on a small app.
# 20 threads is plenty for a low-traffic API.
# ─────────────────────────────────────────
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=4
server.tomcat.max-connections=100
server.tomcat.accept-count=50

# ─────────────────────────────────────────
# Spring Task Scheduler (used by @Scheduled / SubmissionPoller)
# Default pool size is unbounded. Cap it at 2 — only one @Scheduled task exists.
# ─────────────────────────────────────────
spring.task.scheduling.pool.size=2
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=50

# ─────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ─────────────────────────────────────────
# Hibernate performance / memory
# ─────────────────────────────────────────
# Batch inserts/updates — reduces round trips and object allocations
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Disable second-level cache (we have no distributed cache — saves Ehcache/Infinispan overhead)
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
# Reduce Hibernate statistics overhead
spring.jpa.properties.hibernate.generate_statistics=false

# ─────────────────────────────────────────
# HikariCP connection pool
# Default is 10 connections. Each connection keeps a Postgres backend process alive
# and holds ~5–10 MB of memory on both sides. 3–5 is enough for a small app.
# ─────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
# Disable leak detection overhead in prod (set to >0 only when debugging)
spring.datasource.hikari.leak-detection-threshold=0

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# ─────────────────────────────────────────
# JWT
# ─────────────────────────────────────────
app.jwtSecret=changeit-secret-do-not-use-in-production
app.jwtExpirationMs=3600000

# ─────────────────────────────────────────
# Judge0
# ─────────────────────────────────────────
app.judge0.url=https://ce.judge0.com
app.judge0.apiKey=
app.judge0.pollIntervalMs=500
app.judge0.waitTimeoutMs=15000
app.judge0.pollSchedulerMs=2000
app.judge0.pollSchedulerMaxPerRun=20

# ─────────────────────────────────────────
# Actuator (health check for Railway)
# ─────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ─────────────────────────────────────────
# Logging
# ─────────────────────────────────────────
logging.level.org.springframework=WARN
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.com.example=INFO
